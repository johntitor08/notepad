<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Not Defteri</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500&family=Instrument+Serif:ital@0;1&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0e0e0e;
      --surface:   #161616;
      --border:    #252525;
      --accent:    #c8f04a;
      --accent2:   #4af0c8;
      --text:      #e8e8e0;
      --muted:     #555;
      --gutter:    #2e2e2e;
      --bar-h:     42px;
      --sidebar-w: 220px;
    }

    :root[data-theme="light"] {
      --bg:        #f7f7f2;
      --surface:   #ffffff;
      --border:    #e2e2da;
      --accent:    #5c8a00;
      --accent2:   #009e88;
      --text:      #1c1c1a;
      --muted:     #9a9a90;
      --gutter:    #b8b8ae;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      overflow: hidden;
      user-select: none;
    }

    /* ── Title bar ── */
    #titlebar {
      height: var(--bar-h);
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 12px;
      -webkit-app-region: drag;
      gap: 10px;
      position: relative;
    }

    .win-btn {
      -webkit-app-region: no-drag;
      width: 13px; height: 13px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      transition: filter .15s;
    }
    .win-btn:hover { filter: brightness(1.3); }
    #btn-close  { background: #ff5f57; }
    #btn-min    { background: #febc2e; }
    #btn-max    { background: #28c840; }

    #app-title {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      font-size: 11px;
      letter-spacing: .12em;
      color: var(--muted);
      text-transform: uppercase;
      pointer-events: none;
    }

    .spacer { flex: 1; }

    #toolbar {
      -webkit-app-region: no-drag;
      display: flex;
      gap: 4px;
    }

    .tool-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: inherit;
      font-size: 10px;
      letter-spacing: .08em;
      text-transform: uppercase;
      padding: 4px 10px;
      cursor: pointer;
      border-radius: 3px;
      transition: all .15s;
    }
    .tool-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }
    .tool-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #0e0e0e;
    }

    /* ── Layout ── */
    #app {
      display: flex;
      height: calc(100vh - var(--bar-h));
    }

    /* ── Sidebar ── */
    #sidebar {
      width: var(--sidebar-w);
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #sidebar-header {
      padding: 14px 16px 10px;
      font-size: 9px;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    #new-tab-btn {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 18px;
      line-height: 1;
      transition: color .15s;
      padding: 0 2px;
    }
    #new-tab-btn:hover { color: var(--accent); }

    #tabs {
      flex: 1;
      overflow-y: auto;
      padding: 8px 0;
    }
    #tabs::-webkit-scrollbar { width: 3px; }
    #tabs::-webkit-scrollbar-thumb { background: var(--border); }

    .tab-item {
      padding: 9px 16px;
      font-size: 11px;
      color: var(--muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: all .12s;
      border-left: 2px solid transparent;
      position: relative;
    }
    .tab-item:hover { color: var(--text); background: rgba(255,255,255,.03); }
    .tab-item.active {
      color: var(--accent);
      border-left-color: var(--accent);
      background: rgba(200,240,74,.05);
    }
    .tab-name {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .tab-close {
      opacity: 0;
      font-size: 14px;
      color: var(--muted);
      transition: opacity .12s;
    }
    .tab-item:hover .tab-close { opacity: 1; }
    .tab-close:hover { color: #ff5f57; }
    .tab-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--accent);
      flex-shrink: 0;
    }

    /* ── Stats panel ── */
    #stats {
      padding: 12px 16px;
      border-top: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    .stat-row {
      display: flex;
      justify-content: space-between;
      font-size: 10px;
      color: var(--muted);
    }
    .stat-row span:last-child { color: var(--text); }

    /* ── Editor area ── */
    #editor-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
    }

    #editor-header {
      padding: 0 28px;
      height: 36px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid var(--border);
    }

    #file-path {
      font-size: 10px;
      color: var(--muted);
      letter-spacing: .04em;
    }
    #modified-badge {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent2);
      display: none;
    }
    #modified-badge.show { display: block; }

    #editor-wrap {
      flex: 1;
      display: flex;
      overflow: hidden;
      position: relative;
    }

    #line-numbers {
      padding: 20px 0 20px 12px;
      min-width: 48px;
      text-align: right;
      font-size: 12px;
      line-height: 1.75;
      color: var(--gutter);
      user-select: none;
      overflow: hidden;
      background: var(--bg);
      border-right: 1px solid var(--border);
    }

    #editor {
      flex: 1;
      padding: 20px 28px;
      background: var(--bg);
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      line-height: 1.75;
      border: none;
      outline: none;
      resize: none;
      user-select: text;
      caret-color: var(--accent);
      tab-size: 2;
      overflow-y: auto;
    }
    #editor::selection { background: rgba(200,240,74,.2); }
    #editor::placeholder { color: var(--gutter); font-style: italic; }
    #editor::-webkit-scrollbar { width: 4px; }
    #editor::-webkit-scrollbar-thumb { background: var(--border); }

    /* ── Status bar ── */
    #statusbar {
      height: 26px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 20px;
      font-size: 10px;
      color: var(--muted);
      letter-spacing: .05em;
    }
    #statusbar span { display: flex; align-items: center; gap: 5px; }
    #statusbar .accent { color: var(--accent); }
    #statusbar .clickable { cursor: pointer; }
    #statusbar .clickable:hover { filter: brightness(1.35); }

    /* ── Find bar ── */
    #find-bar {
      display: none;
      position: absolute;
      top: 36px;
      right: 20px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 8px 12px;
      gap: 8px;
      align-items: center;
      z-index: 10;
      box-shadow: 0 8px 32px rgba(0,0,0,.5);
    }
    #find-bar.show { display: flex; flex-direction: column; }
    .find-row { display: flex; gap: 8px; align-items: center; }
    #find-input, #replace-input {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: inherit;
      font-size: 11px;
      padding: 4px 8px;
      border-radius: 3px;
      outline: none;
      width: 200px;
    }
    #find-input:focus, #replace-input:focus { border-color: var(--accent); }
    #find-count { font-size: 10px; color: var(--muted); min-width: 40px; }
    .find-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: inherit;
      font-size: 11px;
      padding: 3px 8px;
      cursor: pointer;
      border-radius: 3px;
    }
    .find-btn:hover { border-color: var(--accent); color: var(--accent); }
    .find-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(200,240,74,.08); }

    /* Font size slider */
    #font-slider {
      -webkit-appearance: none;
      width: 70px;
      height: 3px;
      background: var(--border);
      border-radius: 2px;
      outline: none;
      cursor: pointer;
    }
    #font-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 10px; height: 10px;
      border-radius: 50%;
      background: var(--accent);
    }

    /* animations */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    #editor-container { animation: fadeIn .25s ease; }
  </style>
</head>
<body>

<!-- Title bar -->
<div id="titlebar">
  <button class="win-btn" id="btn-close"  title="Kapat"></button>
  <button class="win-btn" id="btn-min"    title="Küçült"></button>
  <button class="win-btn" id="btn-max"    title="Büyüt"></button>
  <span id="app-title">Not Defteri</span>
  <div class="spacer"></div>
  <div id="toolbar">
    <button class="tool-btn" id="btn-new"     >Yeni</button>
    <button class="tool-btn" id="btn-open"    >Aç</button>
    <button class="tool-btn" id="btn-save"    >Kaydet</button>
    <button class="tool-btn" id="btn-saveas"  >Farklı Kaydet</button>
    <button class="tool-btn" id="btn-find"    >Bul</button>
    <button class="tool-btn" id="btn-wrap"    >Kaydır</button>
    <button class="tool-btn" id="btn-theme"   >Tema</button>
  </div>
</div>

<!-- App layout -->
<div id="app">

  <!-- Sidebar -->
  <div id="sidebar">
    <div id="sidebar-header">
      <span>Sekmeler</span>
      <button id="new-tab-btn" title="Yeni sekme">+</button>
    </div>
    <div id="tabs"></div>
    <div id="stats">
      <div class="stat-row"><span>Kelime</span><span id="s-words">0</span></div>
      <div class="stat-row"><span>Karakter</span><span id="s-chars">0</span></div>
      <div class="stat-row"><span>Satır</span><span id="s-lines">0</span></div>
      <div class="stat-row"><span>Boyut</span><span id="s-size">0 B</span></div>
    </div>
  </div>

  <!-- Editor -->
  <div id="editor-container">
    <div id="editor-header">
      <div id="modified-badge" title="Kaydedilmemiş değişiklikler"></div>
      <span id="file-path">kayıt yok</span>
    </div>

    <!-- Find / Replace bar -->
    <div id="find-bar">
      <div class="find-row">
        <input id="find-input" type="text" placeholder="Ara…" spellcheck="false" />
        <button class="find-btn" id="find-case" title="Büyük/küçük harf duyarlı">Aa</button>
        <button class="find-btn" id="find-word" title="Tam kelime">W</button>
        <span id="find-count">—</span>
        <button class="find-btn" id="find-prev" title="Önceki">↑</button>
        <button class="find-btn" id="find-next" title="Sonraki">↓</button>
        <button class="find-btn" id="find-close" title="Kapat">✕</button>
      </div>
      <div class="find-row">
        <input id="replace-input" type="text" placeholder="Değiştir…" spellcheck="false" />
        <button class="find-btn" id="replace-one" title="Değiştir">Değiştir</button>
        <button class="find-btn" id="replace-all" title="Tümünü değiştir">Tümü</button>
      </div>
    </div>

    <div id="editor-wrap">
      <div id="line-numbers"></div>
      <textarea id="editor" spellcheck="false" placeholder="Yazmaya başla…"></textarea>
    </div>

    <div id="statusbar">
      <span>Ln <span class="accent" id="sb-line">1</span></span>
      <span>Col <span class="accent" id="sb-col">1</span></span>
      <span>Seç <span class="accent" id="sb-sel">0</span></span>
      <div class="spacer"></div>
      <span>
        <input id="font-slider" type="range" min="10" max="24" value="13" title="Yazı boyutu" />
        <span id="font-label">13px</span>
      </span>
      <span id="sb-eol" class="accent clickable" title="Satır sonunu değiştir">LF</span>
      <span>UTF-8</span>
    </div>
  </div>
</div>

<script>
// ── State ──────────────────────────────────────────────────
let tabs = [];
let activeTab = null;
let wrapEnabled = false;
let findMatches = [];
let findIndex = 0;

const editor     = document.getElementById('editor');
const lineNums   = document.getElementById('line-numbers');
const filePath   = document.getElementById('file-path');
const modBadge   = document.getElementById('modified-badge');
const tabsEl     = document.getElementById('tabs');
const findBar    = document.getElementById('find-bar');
const findInput  = document.getElementById('find-input');
const findCount  = document.getElementById('find-count');
const replaceInput = document.getElementById('replace-input');

// ── Tab management ─────────────────────────────────────────
function createTab(name = 'İsimsiz', content = '', path = null, eol = 'LF') {
  const id = Date.now() + Math.random();
  const tab = { id, name, content, path, modified: false, cursor: 0, eol };
  tabs.push(tab);
  renderTabs();
  switchTab(id);
  return tab;
}

function renderTabs() {
  tabsEl.innerHTML = '';
  tabs.forEach(t => {
    const el = document.createElement('div');
    el.className = 'tab-item' + (t === activeTab ? ' active' : '');
    el.dataset.id = t.id;

    if (t.modified) {
      const dot = document.createElement('div');
      dot.className = 'tab-dot';
      el.appendChild(dot);
    }
    // textContent avoids HTML injection from file/tab names.
    const nameEl = document.createElement('span');
    nameEl.className = 'tab-name';
    nameEl.title = t.name;
    nameEl.textContent = t.name;
    el.appendChild(nameEl);

    const closeEl = document.createElement('span');
    closeEl.className = 'tab-close';
    closeEl.dataset.close = t.id;
    closeEl.textContent = '×';
    el.appendChild(closeEl);

    el.addEventListener('click', e => {
      if (e.target.dataset.close) { closeTab(t.id); return; }
      switchTab(t.id);
    });
    tabsEl.appendChild(el);
  });
}

function switchTab(id) {
  if (activeTab) {
    activeTab.content = editor.value;
    activeTab.cursor  = editor.selectionStart;
  }
  activeTab = tabs.find(t => t.id === id);
  if (!activeTab) return;
  editor.value = activeTab.content;
  setTimeout(() => {
    editor.selectionStart = editor.selectionEnd = activeTab.cursor;
    editor.focus();
  }, 0);
  filePath.textContent  = activeTab.path || 'kayıt yok';
  modBadge.className    = activeTab.modified ? 'show' : '';
  renderTabs();
  updateLineNumbers();
  updateStats();
  updateStatusBar();
  updateEol();
  persistSession();
}

function updateEol() {
  document.getElementById('sb-eol').textContent = activeTab ? activeTab.eol : 'LF';
}

function closeTab(id) {
  const idx = tabs.findIndex(t => t.id === id);
  if (idx === -1) return;
  const tab = tabs[idx];
  // Sync in-progress edits so the modified check reflects current state.
  if (tab === activeTab) tab.content = editor.value;
  if (tab.modified && !confirm(`"${tab.name}" kaydedilmemiş değişiklikler içeriyor. Kapatılsın mı?`)) return;
  tabs.splice(idx, 1);
  if (tabs.length === 0) { createTab(); return; }
  if (activeTab?.id === id) {
    switchTab(tabs[Math.min(idx, tabs.length - 1)].id);
  } else {
    renderTabs();
  }
  persistSession();
}

// ── Editor helpers ─────────────────────────────────────────
function updateLineNumbers() {
  const lines = editor.value.split('\n').length;
  lineNums.innerHTML = Array.from({length: lines}, (_, i) =>
    `<div>${i + 1}</div>`
  ).join('');
  // sync scroll
  lineNums.scrollTop = editor.scrollTop;
}

function updateStats() {
  const val = editor.value;
  const words = val.trim() ? val.trim().split(/\s+/).length : 0;
  document.getElementById('s-words').textContent = words.toLocaleString('tr');
  document.getElementById('s-chars').textContent = val.length.toLocaleString('tr');
  document.getElementById('s-lines').textContent = val.split('\n').length;
  const bytes = new Blob([val]).size;
  document.getElementById('s-size').textContent =
    bytes < 1024 ? bytes + ' B' : (bytes / 1024).toFixed(1) + ' KB';
}

function updateStatusBar() {
  const start = editor.selectionStart;
  const text  = editor.value.substring(0, start);
  const lines = text.split('\n');
  document.getElementById('sb-line').textContent = lines.length;
  document.getElementById('sb-col').textContent  = lines[lines.length - 1].length + 1;
  const sel = Math.abs(editor.selectionEnd - editor.selectionStart);
  document.getElementById('sb-sel').textContent  = sel;
}

function markModified() {
  if (activeTab) {
    activeTab.modified = true;
    modBadge.className = 'show';
    renderTabs();
    schedulePersist();
  }
}

// ── Editor events ──────────────────────────────────────────
editor.addEventListener('input', () => {
  updateLineNumbers();
  updateStats();
  markModified();
});

editor.addEventListener('scroll', () => {
  lineNums.scrollTop = editor.scrollTop;
});

editor.addEventListener('keydown', e => {
  // Tab key → insert spaces
  if (e.key === 'Tab') {
    e.preventDefault();
    const s = editor.selectionStart, end = editor.selectionEnd;
    editor.value = editor.value.substring(0, s) + '  ' + editor.value.substring(end);
    editor.selectionStart = editor.selectionEnd = s + 2;
    markModified();
  }
  // Enter → keep the current line's leading indentation
  if (e.key === 'Enter' && !e.ctrlKey && !e.altKey) {
    const s = editor.selectionStart;
    const lineStart = editor.value.lastIndexOf('\n', s - 1) + 1;
    const indent = (editor.value.slice(lineStart, s).match(/^[ \t]*/) || [''])[0];
    if (indent) {
      e.preventDefault();
      editor.setRangeText('\n' + indent, s, editor.selectionEnd, 'end');
      markModified();
      updateLineNumbers();
      updateStats();
    }
  }
  // Ctrl+S
  if (e.ctrlKey && e.key === 's' && !e.shiftKey) { e.preventDefault(); handleSave(); }
  if (e.ctrlKey && e.key === 'S') { e.preventDefault(); handleSaveAs(); }
  if (e.ctrlKey && e.key === 'f') { e.preventDefault(); toggleFind(); }
  if (e.ctrlKey && e.key === 'h') { e.preventDefault(); openReplace(); }
  if (e.ctrlKey && e.key === 'g') { e.preventDefault(); gotoLine(); }
  if (e.ctrlKey && e.key === 'n') { e.preventDefault(); handleNew(); }
  if (e.ctrlKey && e.key === 'o') { e.preventDefault(); handleOpen(); }
  if (e.ctrlKey && e.key === 'w') { e.preventDefault(); if (activeTab) closeTab(activeTab.id); }
  // Line operations
  if (e.ctrlKey && !e.shiftKey && e.key === 'd') { e.preventDefault(); duplicateLine(); }
  if (e.ctrlKey && e.shiftKey && e.key === 'K')  { e.preventDefault(); deleteLine(); }
  if (e.altKey && e.key === 'ArrowUp')   { e.preventDefault(); moveLines(-1); }
  if (e.altKey && e.key === 'ArrowDown') { e.preventDefault(); moveLines(1); }
  if (e.key === 'Escape') { findBar.classList.remove('show'); }
});

// ── Line editing ───────────────────────────────────────────
// Range of the full lines spanning the current selection.
function lineRange() {
  const value = editor.value;
  const start = value.lastIndexOf('\n', editor.selectionStart - 1) + 1;
  let end = value.indexOf('\n', editor.selectionEnd);
  if (end === -1) end = value.length;
  return { start, end };
}

function afterLineEdit() {
  markModified();
  updateLineNumbers();
  updateStats();
  updateStatusBar();
}

function duplicateLine() {
  const { start, end } = lineRange();
  const block = editor.value.slice(start, end);
  editor.setRangeText('\n' + block, end, end, 'end'); // setRangeText keeps native undo
  afterLineEdit();
}

function deleteLine() {
  let { start, end } = lineRange();
  if (end < editor.value.length) end += 1;      // consume trailing newline …
  else if (start > 0) start -= 1;               // … or the preceding one on the last line
  editor.setRangeText('', start, end, 'end');
  afterLineEdit();
}

function moveLines(dir) {
  const value = editor.value;
  const { start, end } = lineRange();
  const block = value.slice(start, end);
  if (dir < 0) {
    if (start === 0) return;
    const prevStart = value.lastIndexOf('\n', start - 2) + 1;
    const prevLine = value.slice(prevStart, start - 1);
    editor.setRangeText(block + '\n' + prevLine, prevStart, end, 'preserve');
    editor.setSelectionRange(prevStart, prevStart + block.length);
  } else {
    if (end === value.length) return;
    const nextEnd0 = value.indexOf('\n', end + 1);
    const nextEnd = nextEnd0 === -1 ? value.length : nextEnd0;
    const nextLine = value.slice(end + 1, nextEnd);
    editor.setRangeText(nextLine + '\n' + block, start, nextEnd, 'preserve');
    const newStart = start + nextLine.length + 1;
    editor.setSelectionRange(newStart, newStart + block.length);
  }
  afterLineEdit();
}

editor.addEventListener('keyup',   updateStatusBar);
editor.addEventListener('click',   updateStatusBar);
editor.addEventListener('select',  updateStatusBar);

// ── File operations ────────────────────────────────────────
async function handleNew() {
  createTab();
}

function openContent(name, content, path) {
  // Detect the file's line ending, then normalize to \n for the textarea.
  const eol = /\r\n/.test(content) ? 'CRLF' : 'LF';
  const tab = createTab(name, content.replace(/\r\n/g, '\n'), path, eol);
  tab.modified = false;
  renderTabs();
  modBadge.className = '';
  filePath.textContent = path || 'kayıt yok';
  updateLineNumbers();
  updateStats();
  updateEol();
  persistSession();
}

async function handleOpen() {
  const result = await window.api.openFile();
  if (!result) return;
  const name = result.path.split(/[\\/]/).pop();
  openContent(name, result.content, result.path);
}

// Serialize the active buffer using the tab's chosen line ending.
function contentForSave() {
  return activeTab.eol === 'CRLF'
    ? activeTab.content.replace(/\n/g, '\r\n')
    : activeTab.content;
}

async function handleSave() {
  if (!activeTab) return;
  activeTab.content = editor.value;
  const result = await window.api.saveFile(contentForSave(), activeTab.path);
  if (result) {
    activeTab.path = result.path;
    activeTab.name = result.path.split(/[\\/]/).pop();
    activeTab.modified = false;
    filePath.textContent = result.path;
    modBadge.className = '';
    renderTabs();
    persistSession();
  }
}

async function handleSaveAs() {
  if (!activeTab) return;
  activeTab.content = editor.value;
  const result = await window.api.saveFileAs(contentForSave());
  if (result) {
    activeTab.path = result.path;
    activeTab.name = result.path.split(/[\\/]/).pop();
    activeTab.modified = false;
    filePath.textContent = result.path;
    modBadge.className = '';
    renderTabs();
    persistSession();
  }
}

// ── Find / Replace ─────────────────────────────────────────
function toggleFind() {
  findBar.classList.toggle('show');
  if (findBar.classList.contains('show')) findInput.focus();
}

function openReplace() {
  findBar.classList.add('show');
  if (findInput.value) doFind(findInput.value);
  replaceInput.focus();
}

// Search options toggled from the find bar.
let caseSensitive = false;
let wholeWord = false;

// Build a global regex for `term`, honoring the case/whole-word toggles.
function buildFindRegex(term) {
  let pat = term.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  if (wholeWord) pat = `\\b${pat}\\b`;
  return new RegExp(pat, caseSensitive ? 'g' : 'gi');
}

// All occurrences of `term` in the current editor text.
function computeMatches(term) {
  const matches = [];
  if (!term) return matches;
  const re = buildFindRegex(term);
  let m;
  while ((m = re.exec(editor.value)) !== null) {
    matches.push(m.index);
    if (m.index === re.lastIndex) re.lastIndex++; // guard against zero-length loops
  }
  return matches;
}

function doFind(query) {
  if (!query) { findMatches = []; findCount.textContent = '—'; return; }
  findMatches = computeMatches(query);
  findCount.textContent = findMatches.length ? `${findIndex + 1}/${findMatches.length}` : '0';
  if (findMatches.length) jumpToMatch(0);
}

function replaceCurrent() {
  const term = findInput.value;
  if (!term || !findMatches.length) return;
  const pos = findMatches[findIndex];
  editor.setRangeText(replaceInput.value, pos, pos + term.length, 'end');
  markModified();
  updateLineNumbers();
  updateStats();
  findMatches = computeMatches(term);
  if (!findMatches.length) { findCount.textContent = '0'; return; }
  const after = pos + replaceInput.value.length;
  const next = findMatches.findIndex(p => p >= after);
  jumpToMatch(next === -1 ? 0 : next);
}

function replaceAll() {
  const term = findInput.value;
  if (!term) return;
  const re = buildFindRegex(term);
  const replaced = editor.value.replace(re, () => replaceInput.value); // literal replacement
  if (replaced === editor.value) return;
  editor.value = replaced;
  markModified();
  updateLineNumbers();
  updateStats();
  doFind(term);
}

function jumpToMatch(i) {
  findIndex = (i + findMatches.length) % findMatches.length;
  const pos = findMatches[findIndex];
  editor.focus();
  editor.setSelectionRange(pos, pos + findInput.value.length);
  findCount.textContent = `${findIndex + 1}/${findMatches.length}`;
}

findInput.addEventListener('input', () => doFind(findInput.value));
findInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    e.preventDefault();
    if (findMatches.length) jumpToMatch(findIndex + (e.shiftKey ? -1 : 1));
  } else if (e.key === 'Escape') {
    findBar.classList.remove('show');
    editor.focus();
  }
});
document.getElementById('find-next').addEventListener('click', () => { if (findMatches.length) jumpToMatch(findIndex + 1); });
document.getElementById('find-prev').addEventListener('click', () => { if (findMatches.length) jumpToMatch(findIndex - 1); });
document.getElementById('find-close').addEventListener('click', () => findBar.classList.remove('show'));
document.getElementById('find-case').addEventListener('click', e => {
  caseSensitive = !caseSensitive;
  e.currentTarget.classList.toggle('active', caseSensitive);
  findIndex = 0; doFind(findInput.value);
});
document.getElementById('find-word').addEventListener('click', e => {
  wholeWord = !wholeWord;
  e.currentTarget.classList.toggle('active', wholeWord);
  findIndex = 0; doFind(findInput.value);
});
document.getElementById('replace-one').addEventListener('click', replaceCurrent);
document.getElementById('replace-all').addEventListener('click', replaceAll);
replaceInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') { e.preventDefault(); replaceCurrent(); }
  else if (e.key === 'Escape') { findBar.classList.remove('show'); editor.focus(); }
});

// ── Toolbar buttons ────────────────────────────────────────
document.getElementById('btn-new'   ).addEventListener('click', handleNew);
document.getElementById('btn-open'  ).addEventListener('click', handleOpen);
document.getElementById('btn-save'  ).addEventListener('click', handleSave);
document.getElementById('btn-saveas').addEventListener('click', handleSaveAs);
document.getElementById('btn-find'  ).addEventListener('click', toggleFind);
document.getElementById('btn-wrap'  ).addEventListener('click', () => {
  wrapEnabled = !wrapEnabled;
  editor.style.whiteSpace = wrapEnabled ? 'pre-wrap' : 'pre';
  document.getElementById('btn-wrap').classList.toggle('active', wrapEnabled);
  savePrefs();
});
document.getElementById('btn-theme' ).addEventListener('click', () => {
  currentTheme = currentTheme === 'light' ? 'dark' : 'light';
  applyTheme(currentTheme);
  savePrefs();
});

// ── Line-ending toggle ─────────────────────────────────────
document.getElementById('sb-eol').addEventListener('click', () => {
  if (!activeTab) return;
  activeTab.eol = activeTab.eol === 'CRLF' ? 'LF' : 'CRLF';
  updateEol();
  markModified();
});

document.getElementById('new-tab-btn').addEventListener('click', handleNew);

// ── Window controls ────────────────────────────────────────
document.getElementById('btn-close').addEventListener('click', () => window.api.close());
document.getElementById('btn-min'  ).addEventListener('click', () => window.api.minimize());
document.getElementById('btn-max'  ).addEventListener('click', () => window.api.maximize());

// ── Font size slider ───────────────────────────────────────
const slider = document.getElementById('font-slider');
const fontLabel = document.getElementById('font-label');
function applyFontSize(px) {
  const sz = px + 'px';
  editor.style.fontSize = sz;
  lineNums.style.fontSize = sz;
  fontLabel.textContent = sz;
  updateLineNumbers();
}
slider.addEventListener('input', () => {
  applyFontSize(slider.value);
  savePrefs();
});

// ── Theme ──────────────────────────────────────────────────
let currentTheme = 'dark';
function applyTheme(theme) {
  if (theme === 'light') document.documentElement.setAttribute('data-theme', 'light');
  else document.documentElement.removeAttribute('data-theme');
  document.getElementById('btn-theme').classList.toggle('active', theme === 'light');
}

// ── Editor preferences (font size, word wrap, theme) persist across restarts ──
const PREFS_KEY = 'notepad-prefs';
function savePrefs() {
  try {
    localStorage.setItem(PREFS_KEY, JSON.stringify({
      fontSize: parseInt(slider.value, 10),
      wrap: wrapEnabled,
      theme: currentTheme
    }));
  } catch { /* storage unavailable */ }
}
function loadPrefs() {
  let p;
  try { p = JSON.parse(localStorage.getItem(PREFS_KEY)); } catch { p = null; }
  if (!p) return;
  if (Number.isFinite(p.fontSize) && p.fontSize >= 10 && p.fontSize <= 24) {
    slider.value = p.fontSize;
    applyFontSize(p.fontSize);
  }
  if (p.wrap) {
    wrapEnabled = true;
    editor.style.whiteSpace = 'pre-wrap';
    document.getElementById('btn-wrap').classList.add('active');
  }
  if (p.theme === 'light') {
    currentTheme = 'light';
    applyTheme('light');
  }
}

// ── Drag & drop to open files ──────────────────────────────
document.addEventListener('dragover', e => { e.preventDefault(); });
document.addEventListener('drop', async e => {
  e.preventDefault();
  const files = Array.from(e.dataTransfer.files);
  for (const file of files) {
    try {
      const content = await file.text();
      openContent(file.name, content, file.path || null);
    } catch { /* ignore unreadable drops */ }
  }
});

// ── Go to line ─────────────────────────────────────────────
function gotoLine() {
  const lines = editor.value.split('\n');
  const input = prompt(`Satıra git (1–${lines.length}):`);
  if (input === null) return;
  const n = parseInt(input, 10);
  if (!Number.isFinite(n) || n < 1) return;
  const target = Math.min(n, lines.length);
  let pos = 0;
  for (let i = 0; i < target - 1; i++) pos += lines[i].length + 1;
  editor.focus();
  editor.setSelectionRange(pos, pos + lines[target - 1].length);
  updateStatusBar();
}

// ── Session persistence ────────────────────────────────────
// Open tabs (including unsaved buffers) survive a restart via localStorage.
const SESSION_KEY = 'notepad-session';
let persistTimer = null;

function persistSession() {
  if (activeTab) activeTab.content = editor.value;
  try {
    const data = {
      tabs: tabs.map(t => ({ name: t.name, content: t.content, path: t.path, modified: t.modified, eol: t.eol })),
      activeIndex: tabs.indexOf(activeTab)
    };
    localStorage.setItem(SESSION_KEY, JSON.stringify(data));
  } catch { /* storage unavailable or quota exceeded */ }
}

function schedulePersist() {
  clearTimeout(persistTimer);
  persistTimer = setTimeout(persistSession, 400);
}

function restoreSession() {
  let data;
  try { data = JSON.parse(localStorage.getItem(SESSION_KEY)); } catch { data = null; }
  if (!data || !Array.isArray(data.tabs) || data.tabs.length === 0) return false;
  data.tabs.forEach(t => {
    tabs.push({
      id: Date.now() + Math.random(),
      name: t.name || 'İsimsiz',
      content: t.content || '',
      path: t.path || null,
      modified: !!t.modified,
      cursor: 0,
      eol: t.eol === 'CRLF' ? 'CRLF' : 'LF'
    });
  });
  renderTabs();
  const idx = (data.activeIndex >= 0 && data.activeIndex < tabs.length) ? data.activeIndex : 0;
  switchTab(tabs[idx].id);
  return true;
}

// ── Window close guard ─────────────────────────────────────
// Main process asks before closing; reply with the unsaved-tab count.
window.api.onCheckUnsaved(() => {
  if (activeTab) activeTab.content = editor.value;
  persistSession();
  const unsaved = tabs.filter(t => t.modified).length;
  window.api.confirmClose(unsaved);
});

// ── Init ───────────────────────────────────────────────────
if (!restoreSession()) createTab();
editor.style.whiteSpace = 'pre';
loadPrefs();
</script>
